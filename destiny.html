<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Destiny</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #030008;
            color: white;
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Deep space background */
        .space {
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b022b 0%, #030008 100%);
            z-index: 0;
        }

        .stars {
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.8) 100%, transparent),
                radial-gradient(1px 1px at 30% 60%, rgba(255,182,193,0.9) 100%, transparent),
                radial-gradient(2.5px 2.5px at 70% 40%, rgba(255,255,255,0.7) 100%, transparent),
                radial-gradient(1.5px 1.5px at 80% 80%, rgba(255,105,180,0.8) 100%, transparent);
            background-size: 200px 200px;
            animation: driftSpace 60s linear infinite;
            opacity: 0.6;
        }
        @keyframes driftSpace { from { transform: translateY(0); } to { transform: translateY(-200px); } }

        .text-container {
            z-index: 10;
            text-align: center;
            position: relative;
            width: 100%;
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floating-text {
            position: absolute;
            font-size: 3.5rem;
            color: #ffb6c1;
            text-shadow: 0 0 15px #ff1493, 0 0 30px #ff69b4;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            transition: opacity 2.5s ease, transform 4.5s ease-out;
            text-align: center;
            width: 90%;
            max-width: 900px;
            pointer-events: none;
        }
        
        .floating-text.visible {
            opacity: 1;
            transform: translateY(-20px) scale(1.05); /* Float up slowly */
        }
        
        .floating-text.exit {
            opacity: 0;
            transform: translateY(-80px) scale(1.1);
        }

        @media screen and (max-width: 600px) {
            .floating-text { font-size: 2.2rem; }
        }

        .btn-container {
            position: absolute;
            bottom: 10%;
            z-index: 20;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .next-btn {
            padding: 15px 50px;
            border-radius: 30px;
            border: none;
            background: #ff1493;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 0 20px #ff1493, inset 0 0 10px #ff69b4;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .next-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 0 30px #ff1493, 0 0 50px #ff69b4;
        }
    </style>
</head>
<body>
    <div class="space">
        <div class="stars"></div>
        <div class="stars" style="animation-direction: reverse; background-size: 300px 300px; opacity: 0.4;"></div>
    </div>
    
    <div class="text-container" id="text-container">
        <!-- Texts will be injected here -->
    </div>

    <div class="btn-container" id="btn-container">
        <a href="ending.html" class="next-btn">NEXT</a>
    </div>

    <script>
        const texts = [
            "Some meetings are not planned.",
            "Some conversations are not supposed to last.",
            "We said only two days.",
            "But time stopped counting.",
            "Distance stopped working.",
            "And somehow…",
            "we are still here."
        ];

        const container = document.getElementById('text-container');
        const btnContainer = document.getElementById('btn-container');
        
        let currentIndex = 0;

        function showNextText() {
            if (currentIndex < texts.length) {
                const el = document.createElement('div');
                el.className = 'floating-text';
                el.innerText = texts[currentIndex];
                container.appendChild(el);
                
                // Trigger reflow
                void el.offsetWidth;
                
                // Show text
                el.classList.add('visible');
                
                setTimeout(() => {
                    // Hide text after reading
                    el.classList.remove('visible');
                    el.classList.add('exit');
                    
                    setTimeout(() => {
                        el.remove();
                        currentIndex++;
                        showNextText();
                    }, 2500); // Wait for fade out completely before next
                    
                }, 3500); // Wait 3.5 seconds while reading
                
            } else {
                // Done showing texts, fade in button
                btnContainer.style.opacity = 1;
            }
        }

        // Start animation shortly after load
        setTimeout(showNextText, 1000);
    </script>
    <script src="music.js"></script>
</body>
</html>
